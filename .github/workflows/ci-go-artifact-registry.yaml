name: Build & Push Go Module to Artifact Registry

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MODULE_PATH: consumer

  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: cloud-functions-repository

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build & Push Go Module
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura o Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # 3. Valida que o módulo compila corretamente
      - name: Build module
        run: |
          go build ./src/backend/consumer
          go vet ./src/backend/consumer

      # 5. Autentica no GCP via Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 6. Configura o gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 7. Configura o GOPROXY para apontar para o Artifact Registry
      - name: Configure Go proxy for Artifact Registry
        run: |
          GAR_HOST="${{ env.GAR_LOCATION }}-go.pkg.dev"
          REPO_URL="https://${GAR_HOST}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}"

          # Configura autenticação do Go com o Artifact Registry
          gcloud artifacts print-settings go \
            --repository="${{ env.GAR_REPOSITORY }}" \
            --location="${{ env.GAR_LOCATION }}" \
            --project="${{ env.GCP_PROJECT_ID }}"

          # Define o GOPROXY apontando para o Artifact Registry primeiro
          echo "GOPROXY=https://${GAR_HOST}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }},direct" >> $GITHUB_ENV
          echo "GONOSUMCHECK=${GAR_HOST}/*" >> $GITHUB_ENV
          echo "GONOSUMDB=${GAR_HOST}/*" >> $GITHUB_ENV

      # 8. Configura credenciais do Go para o Artifact Registry
      - name: Configure Go credentials
        run: |
          # Gera o access token e configura o netrc para autenticação
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          GAR_HOST="${{ env.GAR_LOCATION }}-go.pkg.dev"

          echo "machine ${GAR_HOST} login oauth2accesstoken password ${ACCESS_TOKEN}" >> ~/.netrc
          chmod 600 ~/.netrc

      # 9. Publica o módulo Go no Artifact Registry
      - name: Push Go module to Artifact Registry
        if: github.ref == 'refs/heads/main'
        run: |
          # Extrai a versão da tag git, ou usa o SHA curto como fallback
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == "main" ]]; then
            VERSION="v0.0.0-$(date +%Y%m%d%H%M%S)-$(git rev-parse --short HEAD)"
          fi

          GAR_HOST="${{ env.GAR_LOCATION }}-go.pkg.dev"
          REPO_URL="https://${GAR_HOST}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.MODULE_PATH }}"

          echo "📦 Publicando módulo versão: ${VERSION}"

          # Faz o upload do módulo via GOPROXY
          GOFLAGS="-mod=mod" GOPROXY="${REPO_URL}" go list -m all

          gcloud artifacts go upload \
            --repository="${{ env.GAR_REPOSITORY }}" \
            --location="${{ env.GAR_LOCATION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --module-path="${{ env.MODULE_PATH }}" \
            --version="${VERSION}" \
            --source=.

          echo "✅ Módulo publicado: ${{ env.MODULE_PATH }}@${VERSION}"